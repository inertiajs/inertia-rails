name: Feature Request
description: Suggest an enhancement to the inertia-rails gem
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For frontend/JavaScript feature requests, please [use the main Inertia repo](https://github.com/inertiajs/inertia/issues/new/choose).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Include API examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered.
    validations:
      required: false
